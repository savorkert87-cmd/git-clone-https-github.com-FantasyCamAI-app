version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fantasycamai_db
    environment:
      POSTGRES_USER: fantasycamai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fantasycamai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: fantasycamai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fantasycamai_backend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fantasycamai:password@postgres:5432/fantasycamai
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    depends_on:
      - postgres
      - redis
    networks:
      - fantasycamai_network

volumes:
  postgres_data:
  redis_data:

networks:
  fantasycamai_network:
    driver: bridge